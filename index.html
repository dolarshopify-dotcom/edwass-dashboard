<section class="order-section" id="checkout">
    <h2>اطلب الآن - الدفع عند الاستلام</h2>
    <form class="order-form">
        <div class="form-group">
            <label for="fullname">الاسم الكامل</label>
            <input type="text" id="fullname" name="fullname" placeholder="أدخل اسمك الكامل هنا" required>
        </div>
        
        <div class="form-group">
            <label for="phone">رقم الهاتف</label>
            <input type="tel" id="phone" name="phone" placeholder="أدخل رقم هاتفك للتواصل معك" required>
        </div>
        
        <div class="form-group">
            <label for="address">العنوان أو الولاية/المدينة</label>
            <input type="text" id="address" name="address" placeholder="أدخل عنوانك بالتفصيل" required>
        </div>
        
        <button type="submit" class="submit-btn">تأكيد الطلب الآن</button>
    </form>
</section>
