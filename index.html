<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متجري الإلكتروني</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🛍️ متجري الإلكتروني</h1>
</header>

<main>
  <div class="product">
    <h2>هاتف ذكي</h2>
    <p>السعر: 500 دولار</p>
    <button>أضف إلى السلة</button>
  </div>

  <div class="product">
    <h2>ساعة ذكية</h2>
    <p>السعر: 120 دولار</p>
    <button>أضف إلى السلة</button>
  </div>

  <div class="product">
    <h2>سماعات لاسلكية</h2>
    <p>السعر: 80 دولار</p>
    <button>أضف إلى السلة</button>
  </div>
</main>
<form id="orderForm">
    <input type="text" placeholder="الاسم الكامل" required>
    <input type="tel" placeholder="رقم الهاتف" required>

    <select id="wilaya" required>
        <option value="">اختر الولاية</option>
        <option value="الجزائر">الجزائر</option>
        <option value="وهران">وهران</option>
        <option value="سطيف">سطيف</option>
        <option value="قسنطينة">قسنطينة</option>
    </select>

    <input type="text" placeholder="البلدية" required>
    <input type="text" placeholder="العنوان الكامل" required>

    <p>سعر التوصيل: <span id="deliveryPrice">0</span> دج</p>

    <button type="submit">تأكيد الطلب</button>
</form>
<script src="script.js"></script>

</body>
</html>
