<div class="checkout-card">
    <div class="checkout-header">
        <h2>🔥 اطلب الآن ولا تفوت الفرصة!</h2>
        <p>املأ المعلومات أدناه وسيتم الاتصال بك لتأكيد الطلب (الدفع عند الاستلام)</p>
    </div>

    <!-- الزر الأول في الأعلى لتسريع عملية الطلب للعملاء المستعجلين -->
    <button type="button" class="btn-confirm top-btn" onclick="scrollToForm()">
        ⚡ اضغط هنا للطلب السريع
    </button>

    <form id="orderForm" onsubmit="handleOrderSubmit(event)">
        <div class="form-group">
            <label>الاسم الكامل <span class="required">*</span></label>
            <input type="text" id="fullName" placeholder="مثال: محمد أمين" required>
        </div>

        <div class="form-group">
            <label>رقم الهاتف <span class="required">*</span></label>
            <input type="tel" id="phone" placeholder="05xxxxxxxx / 06xxxxxxxx / 07xxxxxxxx" required dir="ltr">
        </div>

        <div class="form-group">
            <label>الولاية <span class="required">*</span></label>
            <select id="wilaya" onchange="updateDeliveryOptions()" required>
                <option value="">-- اختر الولاية --</option>
                <option value="alger">16 - الجزائر</option>
                <option value="oran">31 - وهران</option>
                <option value="blida">09 - البليدة</option>
                <option value="constantine">25 - قسنطينة</option>
            </select>
        </div>

        <div class="form-group">
            <label>البلدية <span class="required">*</span></label>
            <select id="baladiya" required>
                <option value="">-- اختر الولاية أولاً --</option>
            </select>
        </div>

        <div class="form-group">
            <label>طريقة التوصيل <span class="required">*</span></label>
            <div class="delivery-options">
                <label class="radio-label">
                    <input type="radio" name="deliveryType" value="home" checked onchange="calculateTotal()"> 
                    توصيل للمنزل (دوردور)
                </label>
                <label class="radio-label">
                    <input type="radio" name="deliveryType" value="desk" onchange="calculateTotal()"> 
                    توقيف المكتب (Stop Desk)
                </label>
            </div>
        </div>

        <!-- ملخص الفاتورة -->
        <div class="order-summary">
            <div class="summary-row">
                <span>سعر المنتج:</span>
                <span id="productPrice">2000</span> دج
            </div>
            <div class="summary-row">
                <span>سعر التوصيل:</span>
                <span id="shippingPrice">0</span> دج
            </div>
            <hr>
            <div class="summary-row total-row">
                <span>المجموع الكلي:</span>
                <span id="totalPrice">2000</span> دج
            </div>
        </div>

        <!-- الزر الثاني (الرئيسي) لتأكيد الطلب -->
        <button type="submit" class="btn-confirm main-btn">
            🛒 تأكيد الطلبية الآن (الدفع عند الاستلام)
        </button>
    </form>

    <!-- الزر الثالث في الأسفل لتعزيز معدل التحويل -->
    <button type="button" class="btn-confirm bottom-btn" onclick="scrollToForm()">
        ✨ أكد طلبك واستفد من التوصيل السريع
    </button>
</div>
