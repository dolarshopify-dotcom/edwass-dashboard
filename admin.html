<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDWASS - لوحة التحكم</title>
    <style>
        body { font-family: Tahoma, sans-serif; background: #f8fafc; margin: 0; padding: 20px; direction: rtl; color: #1e293b; }
        .container { max-width: 1050px; margin: auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #0f172a; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #334155; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn-save { background: #10b981; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: background 0.2s; }
        .btn-save:hover { background: #059669; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; }
        th { background: #f1f5f9; color: #0f172a; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; display: inline-block; }
        .badge-جديد { background: #f1f5f9; color: #475569; }
        .badge-مؤكد { background: #dcfce7; color: #166534; }
        .badge-مؤجل { background: #fef9c3; color: #854d0e; }
        .badge-لاحقاً { background: #e0f2fe; color: #0369a1; }
        .badge-ملغاة { background: #fee2e2; color: #991b1b; }

        .actions { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
        .actions button { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; color: white; }
        .b-conf { background: #16a34a; }
        .b-post { background: #ca8a04; }
        .b-late { background: #0284c7; }
        .b-canc { background: #dc2626; }
        .alert-box { background: #dcfce7; color: #166534; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="alert" class="alert-box">تم حفظ التغييرات بنجاح!</div>
    
    <!-- قسم الإعدادات في الأعلى -->
    <h2>⚙️ IDWASS - إعدادات المتجر الأساسية</h2>
    <form id="admin-form">
        <div class="grid">
            <div class="form-group">
                <label>اسم المنتج:</label>
                <input type="text" id="p-name" required>
            </div>
            <div class="form-group">
                <label>سعر المنتج (دج):</label>
                <input type="number" id="p-price" required>
            </div>
            <div class="form-group">
                <label>سعر توصيل المنزل (دج):</label>
                <input type="number" id="p-home" required>
            </div>
            <div class="form-group">
                <label>سعر توصيل المكتب Stop Desk (دج):</label>
                <input type="number" id="p-desk" required>
            </div>
        </div>
        <button type="submit" class="btn-save">حفظ التغييرات</button>
    </form>

    <!-- قسم الطلبات في الأسفل -->
    <h2 style="margin-top: 40px;">📦 إدارة الطلبات الواردة (<span id="orders-count">0</span>)</h2>
    <table>
        <thead>
            <tr>
                <th>التاريخ</th>
                <th>الاسم</th>
                <th>الهاتف</th>
                <th>الولاية</th>
                <th>التوصيل</th>
                <th>المجموع</th>
                <th>الحالة</th>
                <th>تأكيد الطلبية (إجراءات)</th>
            </tr>
        </thead>
        <tbody id="orders-body">
            <!-- الطلبات تظهر هنا تلقائياً -->
        </tbody>
    </table>
</div>

<script>
    const defaultSettings = {
        productName: "EDWASS - Hoodie Pro",
        productPrice: 3500,
        homeDeliveryPrice: 600,
        stopDeskPrice: 400
    };

    let settings = JSON.parse(localStorage.getItem('store_settings')) || defaultSettings;

    document.getElementById('p-name').value = settings.productName;
    document.getElementById('p-price').value = settings.productPrice;
    document.getElementById('p-home').value = settings.homeDeliveryPrice;
    document.getElementById('p-desk').value = settings.stopDeskPrice;

    document.getElementById('admin-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        settings.productName = document.getElementById('p-name').value;
        settings.productPrice = Number(document.getElementById('p-price').value);
        settings.homeDeliveryPrice = Number(document.getElementById('p-home').value);
        settings.stopDeskPrice = Number(document.getElementById('p-desk').value);

        localStorage.setItem('store_settings', JSON.stringify(settings));

        let alertBox = document.getElementById('alert');
        alertBox.style.display = 'block';
        setTimeout(() => { alertBox.style.display = 'none'; }, 3000);
    });

    function loadOrders() {
        let orders = JSON.parse(localStorage.getItem('store_orders')) || [];
        document.getElementById('orders-count').innerText = orders.length;
        let tbody = document.getElementById('orders-body');
        tbody.innerHTML = '';

        if(orders.length === 0) {
            tbody.innerHTML = <tr><td colspan="8" style="color: #888; padding: 20px;">لا توجد طلبات جديدة حتى الآن</td></tr>;
            return;
        }

        orders.forEach(ord => {
            let status = ord.status || 'جديد';
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${ord.date}</td>
                <td><b>${ord.name}</b></td>
                <td>${ord.phone}</td>
                <td>${ord.wilaya}</td>
                <td>${ord.deliveryType}</td>
                <td><b>${ord.total}</b></td>
                <td><span class="badge badge-${status}">${status}</span></td>
                <td>
                    <div class="actions">
                        <button class="b-conf" onclick="changeStatus(${ord.id}, 'مؤكد')">تأكيد</button>
                        <button class="b-post" onclick="changeStatus(${ord.id}, 'مؤجل')">مؤجل</button>
                        <button class="b-late" onclick="changeStatus(${ord.id}, 'لاحقاً')">لاحقاً</button>
                        <button class="b-canc" onclick="changeStatus(${ord.id}, 'ملغاة')">إلغاء</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function changeStatus(id, newStatus) {
        let orders = JSON.parse(localStorage.getItem('store_orders')) || [];
        let order = orders.find(o => o.id === id);
        if(order) {
            order.status = newStatus;
            localStorage.setItem('store_orders', JSON.stringify(orders));
            loadOrders();
        }
    }

    loadOrders();
</script>

</body>
</html>
<footer style="text-align: center; padding: 20px; color: #64748b; font-size: 14px; margin-top: 30px; border-top: 1px solid #e2e8f0;">
    فريق IDWASS يعمل ليل نهار لإكمال المتجر قريباً، شكراً لتفهمكم.
</footer>
